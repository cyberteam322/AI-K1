<!DOCTYPE html>
<html lang="id">

    <style>
        :root {
            --cyan: #00f2ff;
            --magenta: #ff0055;
            --purple: #7000ff;
            --bg: #020202;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Particle Background Canvas */
        #canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.5;
        }

        .interface {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 5px;
            color: var(--cyan);
            margin-bottom: 50px;
            text-shadow: 0 0 15px var(--cyan);
            opacity: 0.8;
        }

        /* Core Orb Section */
        .core-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 50%;
            transition: 0.5s;
        }
